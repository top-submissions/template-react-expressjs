name: 🐛 Bug Report
description: Report a bug or unexpected behavior in Golden Fur
title: 'fix(<scope>): <short description>'
labels: ['bug', 'needs-triage']
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        ## 🐛 Bug Report
        Thanks for reporting a bug! The more detail you provide, the faster we can fix it.

  - type: dropdown
    id: scope
    attributes:
      label: Scope / Area
      description: Which part of the app is affected?
      options:
        - Appointments
        - Pets / Records
        - Authentication
        - User Management
        - Dashboard
        - Navigation / Layout
        - Search
        - Notifications
        - Other
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      description: How badly does this affect the app?
      options:
        - 'Critical — app crashes or data is lost'
        - 'High — major feature is broken'
        - 'Medium — feature partially works'
        - 'Low — minor visual or UX issue'
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug. Include what you expected to happen vs what actually happened.
      placeholder: |
        Expected: ...
        Actual: ...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Exact steps to trigger the bug consistently.
      placeholder: |
        1. Go to '...'
        2. Click '...'
        3. See error
    validations:
      required: true

  - type: dropdown
    id: browser
    attributes:
      label: Browser
      description: Which browser did this occur in?
      multiple: true
      options:
        - Chrome
        - Firefox
        - Edge
        - Safari
        - Other
    validations:
      required: false

  - type: input
    id: node-version
    attributes:
      label: Node.js Version
      description: Run `node --version` and paste the output.
      placeholder: 'e.g. v20.11.0'
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Error Logs / Console Output
      description: Paste any relevant error messages or stack traces here.
      render: shell
    validations:
      required: false

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: Drag and drop screenshots here if applicable.
    validations:
      required: false

  - type: checkboxes
    id: preflight
    attributes:
      label: Pre-submission Checklist
      options:
        - label: I searched existing issues and this bug hasn't been reported yet.
          required: true
        - label: I can reproduce this bug consistently.
          required: true
